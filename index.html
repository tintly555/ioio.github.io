```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft 神器库 & 指令生成器</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:#080b12;color:#fff}
header{padding:34px 18px;text-align:center;background:linear-gradient(135deg,#111827,#1e293b,#0f172a)}
h1{margin:0;font-size:38px;color:#ffd166}
header p{color:#cbd5e1}
nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
button{border:0;border-radius:12px;padding:10px 15px;background:#26344f;color:white;font-weight:bold;cursor:pointer}
button:hover{background:#3b5b8f}
.wrap{max-width:1200px;margin:auto;padding:20px}
.panel{display:none}
.panel.active{display:block}
.notice{background:#172033;border:1px solid #334155;border-radius:14px;padding:14px;margin:14px 0;color:#d1d5db}
input,select,textarea{width:100%;padding:11px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:white;margin:6px 0 12px}
textarea{min-height:90px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:16px}
.card{background:#111827;border:1px solid #2b3758;border-radius:16px;padding:16px;box-shadow:0 8px 22px #0007}
.card h2{margin:0 0 8px;color:#ffd166}
.tag{display:inline-block;background:#24385f;color:#9fd3ff;border-radius:999px;padding:4px 10px;font-size:13px;margin-bottom:10px}
pre{background:#020617;color:#d7f7ff;padding:13px;border-radius:12px;white-space:pre-wrap;word-break:break-word;overflow:auto}
.copy{background:#00c2ff;color:#00111a}
.copy:hover{background:#7ddfff}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.small{font-size:13px;color:#9ca3af}
hr{border:0;border-top:1px solid #334155;margin:22px 0}
</style>
</head>
<body>
<header>
<h1>⚔ Minecraft 神器库 ⚔</h1>
<p>不会写指令？点一点生成。复杂神器直接复制。</p>
<nav>
<button onclick="show('library')">📦 神器库</button>
<button onclick="show('generator')">⚡ 指令生成器</button>
<button onclick="show('common')">📚 常用指令</button>
</nav>
</header>

<div class="wrap">

<section id="library" class="panel active">
<div class="notice">⚠️ 大多数生成器仅支持基础功能。复杂神器、特殊NBT、高级Component、特殊机制，请直接在神器库复制完整指令。</div>
<input id="search" placeholder="搜索：火球 / 鞘翅 / 药水 / 盔甲 / 烟花...">
<div style="margin:12px 0">
<button onclick="filterCat('全部')">全部</button>
<button onclick="filterCat('武器')">武器</button>
<button onclick="filterCat('盔甲')">盔甲</button>
<button onclick="filterCat('工具')">工具</button>
<button onclick="filterCat('药水')">药水</button>
<button onclick="filterCat('爆炸')">爆炸</button>
<button onclick="filterCat('鞘翅')">鞘翅</button>
</div>
<div id="cards" class="grid"></div>
</section>

<section id="generator" class="panel">
<h2>⚡ 简易指令生成器</h2>
<div class="notice">这里适合生成基础指令：TP、召唤、生存创造切换、时间天气、给予物品、效果。复杂神器请用神器库。</div>
<div class="row">
<div><label>功能</label><select id="genType" onchange="drawGen()">
<option value="tp">TP传送</option>
<option value="summon">召唤生物</option>
<option value="give">获得物品</option>
<option value="effect">药水效果</option>
<option value="gamemode">游戏模式</option>
<option value="time">时间</option>
<option value="weather">天气</option>
<option value="kill">清除/击杀</option>
</select></div>
</div>
<div id="genBox"></div>
<h3>生成结果</h3>
<pre id="genOut">/tp @p 0 64 0</pre>
<button class="copy" onclick="copyText(document.getElementById('genOut').innerText)">📋 复制生成指令</button>
</section>

<section id="common" class="panel">
<h2>📚 常用指令</h2>
<div class="grid" id="commonList"></div>
</section>

</div>

<script>
const commands=[
["不死圣杖","武器",`/give @p stick[max_stack_size=64,custom_name='{"text":"不死圣杖","italic":false,"bold":true,"color":"gold"}',death_protection={death_effects:[{type:"apply_effects",effects:[{id:"minecraft:regeneration",amplifier:9,duration:1200},{id:"minecraft:resistance",amplifier:4,duration:1200},{id:"minecraft:strength",amplifier:9,duration:1200},{id:"minecraft:speed",amplifier:3,duration:1200},{id:"minecraft:jump_boost",amplifier:3,duration:1200},{id:"minecraft:night_vision",amplifier:0,duration:1200},{id:"minecraft:fire_resistance",amplifier:0,duration:1200},{id:"minecraft:absorption",amplifier:9,duration:1200}]}]},attribute_modifiers=[{id:"d",type:"minecraft:attack_damage",amount:1048576,operation:"add_value",slot:"mainhand"},{id:"s",type:"minecraft:attack_speed",amount:1024,operation:"add_value",slot:"mainhand"}],enchantments={sharpness:255,smite:255,bane_of_arthropods:255,knockback:255,fire_aspect:255,looting:255,sweeping_edge:255,unbreaking:255,mending:1},enchantment_glint_override=true] 64`],
["极限头盔","盔甲",`/give @p netherite_helmet[attribute_modifiers=[{id:"h1",type:"minecraft:max_health",amount:4096,operation:"add_value",slot:"head"},{id:"h2",type:"minecraft:armor",amount:2048,operation:"add_value",slot:"head"},{id:"h3",type:"minecraft:armor_toughness",amount:2048,operation:"add_value",slot:"head"}],enchantments={protection:255,blast_protection:255,fire_protection:255,projectile_protection:255,respiration:255,aqua_affinity:1,thorns:255,unbreaking:255,mending:1}]`],
["极限胸甲","盔甲",`/give @p netherite_chestplate[attribute_modifiers=[{id:"c1",type:"minecraft:max_health",amount:4096,operation:"add_value",slot:"chest"},{id:"c2",type:"minecraft:armor",amount:2048,operation:"add_value",slot:"chest"},{id:"c3",type:"minecraft:armor_toughness",amount:2048,operation:"add_value",slot:"chest"},{id:"c4",type:"minecraft:knockback_resistance",amount:1,operation:"add_value",slot:"chest"}],enchantments={protection:255,blast_protection:255,fire_protection:255,projectile_protection:255,thorns:255,unbreaking:255,mending:1}]`],
["极限护腿","盔甲",`/give @p netherite_leggings[attribute_modifiers=[{id:"l1",type:"minecraft:max_health",amount:4096,operation:"add_value",slot:"legs"},{id:"l2",type:"minecraft:armor",amount:2048,operation:"add_value",slot:"legs"},{id:"l3",type:"minecraft:armor_toughness",amount:2048,operation:"add_value",slot:"legs"}],enchantments={protection:255,blast_protection:255,fire_protection:255,projectile_protection:255,thorns:255,unbreaking:255,mending:1}]`],
["极限靴子","盔甲",`/give @p netherite_boots[attribute_modifiers=[{id:"b1",type:"minecraft:max_health",amount:4096,operation:"add_value",slot:"feet"},{id:"b2",type:"minecraft:armor",amount:2048,operation:"add_value",slot:"feet"},{id:"b3",type:"minecraft:armor_toughness",amount:2048,operation:"add_value",slot:"feet"},{id:"b4",type:"minecraft:knockback_resistance",amount:1,operation:"add_value",slot:"feet"}],enchantments={protection:255,blast_protection:255,fire_protection:255,projectile_protection:255,feather_falling:255,depth_strider:255,soul_speed:255,thorns:255,unbreaking:255,mending:1}]`],
["超级镐子","工具",`/give @p netherite_pickaxe[enchantments={efficiency:255,fortune:255,unbreaking:255,mending:1}]`],
["超级恢复药水","药水",`/give @p splash_potion[potion_contents={custom_effects:[{id:"minecraft:instant_health",amplifier:255,duration:1},{id:"minecraft:regeneration",amplifier:255,duration:1200},{id:"minecraft:absorption",amplifier:255,duration:1200}]},max_stack_size=64] 64`],
["超级弩","武器",`/give @p crossbow[enchantments={quick_charge:255,unbreaking:255,mending:1}]`],
["超级烟花模板","爆炸",`/give @p firework_rocket[fireworks={flight_duration:3,explosions:[{shape:"large_ball"},{shape:"large_ball"},{shape:"large_ball"},{shape:"large_ball"},{shape:"large_ball"},{shape:"large_ball"},{shape:"large_ball"},{shape:"large_ball"}]}] 64`],
["旗子矛","武器",`/give @p diamond_spear[item_model="minecraft:white_banner",custom_name='{"text":"战旗","color":"gold","bold":true,"italic":false}',attribute_modifiers=[{id:"damage",type:"minecraft:attack_damage",amount:20,operation:"add_value",slot:"mainhand"}],enchantments={lunge:15,knockback:4,unbreaking:3,mending:1}]`],
["超级牛排","工具",`/give @p cooked_beef[food={nutrition:1000,saturation:1000,can_always_eat:true},consumable={consume_seconds:0.05}] 64`],
["战斗之神的馈赠","药水",`/give @p splash_potion[item_model="minecraft:dragon_egg",custom_name='{"text":"战斗之神的馈赠","color":"gold","bold":true,"italic":false}',max_stack_size=64,potion_contents={custom_effects:[{id:"minecraft:regeneration",amplifier:4,duration:36000},{id:"minecraft:resistance",amplifier:4,duration:36000},{id:"minecraft:strength",amplifier:4,duration:36000},{id:"minecraft:speed",amplifier:2,duration:36000},{id:"minecraft:jump_boost",amplifier:1,duration:36000},{id:"minecraft:night_vision",amplifier:0,duration:36000},{id:"minecraft:fire_resistance",amplifier:0,duration:36000},{id:"minecraft:water_breathing",amplifier:0,duration:36000},{id:"minecraft:saturation",amplifier:0,duration:36000},{id:"minecraft:absorption",amplifier:4,duration:36000}]}}] 64`],
["劣质不死图腾","药水",`/give @p totem_of_undying[max_stack_size=64,custom_name='{"text":"劣质不死图腾","color":"dark_green","italic":false}',death_protection={death_effects:[{type:"apply_effects",effects:[{id:"minecraft:nausea",amplifier:0,duration:300},{id:"minecraft:poison",amplifier:1,duration:300},{id:"minecraft:weakness",amplifier:1,duration:300}]}]}] 64`],
["浴火重生药水","药水",`/give @p splash_potion[max_stack_size=64,custom_name='{"text":"浴火重生","color":"gold","bold":true,"italic":false}',potion_contents={custom_effects:[{id:"minecraft:instant_damage",amplifier:0,duration:1},{id:"minecraft:regeneration",amplifier:4,duration:1200}]}}] 64`],
["灾厄之瓶样式喷溅药水","药水",`/give @p splash_potion[item_model="minecraft:ominous_bottle",custom_name='{"text":"灾厄之瓶","color":"dark_red","bold":true,"italic":false}',max_stack_size=64,potion_contents={custom_effects:[{id:"minecraft:blindness",amplifier:0,duration:600},{id:"minecraft:nausea",amplifier:0,duration:600},{id:"minecraft:slowness",amplifier:2,duration:600},{id:"minecraft:hunger",amplifier:4,duration:600},{id:"minecraft:weakness",amplifier:2,duration:600}]}}] 64`],

["净化圣水","药水",`/give @p milk_bucket[custom_name='{"text":"净化圣水","color":"white","bold":true,"italic":false}',max_stack_size=64,consumable={consume_seconds:2,on_consume_effects:[{type:"clear_all_effects"},{type:"apply_effects",effects:[{id:"minecraft:night_vision",amplifier:0,duration:100}]}]}] 64`],
["诸神之翼","鞘翅",`/give @p elytra[custom_name='{"text":"诸神之翼","color":"gold","bold":true,"italic":false}',unbreakable={},enchantment_glint_override=true,attribute_modifiers=[{id:"speed",type:"minecraft:movement_speed",amount:1.0,operation:"add_multiplied_total",slot:"chest"},{id:"kb",type:"minecraft:knockback_resistance",amount:1.0,operation:"add_value",slot:"chest"},{id:"armor",type:"minecraft:armor",amount:20,operation:"add_value",slot:"chest"},{id:"tough",type:"minecraft:armor_toughness",amount:20,operation:"add_value",slot:"chest"}]]`],
["潮涌核心样式烟花火箭","鞘翅",`/give @p firework_rocket[item_model="minecraft:conduit",custom_name='{"text":"神风推进器","color":"gold","bold":true,"italic":false}',enchantment_glint_override=true,fireworks={flight_duration:3}] 64`],
["超级火球","爆炸",`/summon fireball ~ ~1 ~ {ExplosionPower:127}`]
];

const common=[
["创造模式","/gamemode creative @p"],
["生存模式","/gamemode survival @p"],
["晴天","/weather clear"],
["雷暴","/weather thunder"],
["白天","/time set day"],
["夜晚","/time set night"],
["清除掉落物","/kill @e[type=item]"],
["定位蘑菇岛","/locate biome minecraft:mushroom_fields"],
["召唤凋零","/summon wither ~ ~ ~"],
["召唤末影龙","/summon ender_dragon ~ ~ ~"]
];

let currentCat="全部";

function show(id){
 document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function copyText(t){
 navigator.clipboard.writeText(t);
 alert("已复制！");
}

function filterCat(c){currentCat=c;renderCards();}

function renderCards(){
 const q=document.getElementById("search").value.toLowerCase();
 const box=document.getElementById("cards");
 box.innerHTML="";
 commands.filter(x=>(currentCat==="全部"||x[1]===currentCat)&&(x[0].toLowerCase().includes(q)||x[1].toLowerCase().includes(q)||x[2].toLowerCase().includes(q))).forEach((x,i)=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<span class="tag">${x[1]}</span><h2>${x[0]}</h2><pre>${x[2]}</pre><button class="copy">📋 复制</button>`;
  div.querySelector("button").onclick=()=>copyText(x[2]);
  box.appendChild(div);
 });
}

function renderCommon(){
 const box=document.getElementById("commonList");
 box.innerHTML="";
 common.forEach(x=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<h2>${x[0]}</h2><pre>${x[1]}</pre><button class="copy">📋 复制</button>`;
  div.querySelector("button").onclick=()=>copyText(x[1]);
  box.appendChild(div);
 });
}

function drawGen(){
 const t=document.getElementById("genType").value;
 const b=document.getElementById("genBox");
 if(t==="tp") b.innerHTML=`<div class="row"><div><label>目标</label><select id="target"><option>@p</option><option>@a</option><option>@s</option></select></div><div><label>X</label><input id="x" value="0"></div><div><label>Y</label><input id="y" value="64"></div><div><label>Z</label><input id="z" value="0"></div></div>`;
 if(t==="summon") b.innerHTML=`<div class="row"><div><label>生物</label><select id="mob"><option value="wither">凋零</option><option value="zombie">僵尸</option><option value="skeleton">骷髅</option><option value="horse">马</option><option value="ender_dragon">末影龙</option><option value="creeper">苦力怕</option><option value="phantom">幻翼</option></select></div><div><label>X</label><input id="x" value="~"></div><div><label>Y</label><input id="y" value="~"></div><div><label>Z</label><input id="z" value="~"></div></div>`;
 if(t==="give") b.innerHTML=`<div class="row"><div><label>物品ID</label><input id="item" value="diamond_sword"></div><div><label>数量</label><input id="count" value="1"></div></div><p class="small">例：diamond_sword / netherite_pickaxe / firework_rocket</p>`;
 if(t==="effect") b.innerHTML=`<div class="row"><div><label>目标</label><select id="target"><option>@p</option><option>@a</option><option>@s</option></select></div><div><label>效果</label><select id="eff"><option value="speed">速度</option><option value="strength">力量</option><option value="resistance">抗性</option><option value="regeneration">生命恢复</option><option value="night_vision">夜视</option><option value="jump_boost">跳跃</option><option value="haste">急迫</option></select></div><div><label>时间/秒</label><input id="sec" value="60"></div><div><label>等级</label><input id="amp" value="1"></div></div>`;
 if(t==="gamemode") b.innerHTML=`<div class="row"><div><label>模式</label><select id="mode"><option value="creative">创造</option><option value="survival">生存</option><option value="adventure">冒险</option><option value="spectator">旁观</option></select></div><div><label>目标</label><select id="target"><option>@p</option><option>@a</option><option>@s</option></select></div></div>`;
 if(t==="time") b.innerHTML=`<label>时间</label><select id="timev"><option value="day">白天</option><option value="noon">中午</option><option value="night">夜晚</option><option value="midnight">午夜</option></select>`;
 if(t==="weather") b.innerHTML=`<label>天气</label><select id="weatherv"><option value="clear">晴天</option><option value="rain">雨天</option><option value="thunder">雷暴</option></select>`;
 if(t==="kill") b.innerHTML=`<label>目标</label><select id="killt"><option value="@e[type=item]">清除掉落物</option><option value="@e[type=!player]">清除非玩家实体</option><option value="@e[type=monster]">清除怪物</option><option value="@p">击杀最近玩家</option></select>`;
 b.querySelectorAll("input,select").forEach(e=>e.addEventListener("input",makeCmd));
 makeCmd();
}

function val(id){return document.getElementById(id)?.value||"";}

function makeCmd(){
 const t=val("genType");
 let c="";
 if(t==="tp") c=`/tp ${val("target")} ${val("x")} ${val("y")} ${val("z")}`;
 if(t==="summon") c=`/summon ${val("mob")} ${val("x")} ${val("y")} ${val("z")}`;
 if(t==="give") c=`/give @p ${val("item")} ${val("count")}`;
 if(t==="effect") c=`/effect give ${val("target")} ${val("eff")} ${val("sec")} ${Math.max(0,Number(val("amp"))-1)} true`;
 if(t==="gamemode") c=`/gamemode ${val("mode")} ${val("target")}`;
 if(t==="time") c=`/time set ${val("timev")}`;
 if(t==="weather") c=`/weather ${val("weatherv")}`;
 if(t==="kill") c=`/kill ${val("killt")}`;
 document.getElementById("genOut").innerText=c;
}

document.getElementById("search").addEventListener("input",renderCards);
renderCards();
renderCommon();
drawGen();
</script>
</body>
</html>
```
