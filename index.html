<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft 神器库</title>
<style>
body{margin:0;font-family:Arial;background:#0b0f17;color:white}
header{padding:35px 20px;text-align:center;background:linear-gradient(135deg,#101827,#1f2a44)}
h1{margin:0;font-size:42px}
p{color:#b8c0d0}
#search{width:80%;max-width:700px;padding:14px;border-radius:12px;border:0;font-size:18px;margin-top:20px}
.tabs{text-align:center;margin:20px}
.tabs button{margin:5px;padding:10px 16px;border:0;border-radius:10px;background:#26344f;color:white;cursor:pointer}
.tabs button:hover{background:#3d5a91}
.tabs button.active{background:#00c2ff;color:#00111a;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:18px;padding:25px}
.card{background:#151c2e;border:1px solid #2b3758;border-radius:16px;padding:18px;box-shadow:0 8px 20px #0008}
.card h2{margin:0 0 8px;color:#ffd166}
.tag{display:inline-block;background:#24385f;color:#9fd3ff;border-radius:999px;padding:4px 10px;font-size:13px;margin-bottom:10px}
pre{background:#05070d;color:#d7f7ff;padding:14px;border-radius:12px;overflow:auto;white-space:pre-wrap;word-break:break-word}
.copy{background:#00c2ff;color:#00111a;border:0;padding:10px 14px;border-radius:10px;font-weight:bold;cursor:pointer}
.copy:hover{background:#6ee7ff}

/* 生成器样式 */
.gen-section{max-width:1100px;margin:30px auto;padding:25px;background:linear-gradient(135deg,#13203a,#1a2848);border-radius:20px;border:2px solid #3d5a91;box-shadow:0 8px 30px #0009}
.gen-section h2{margin:0 0 8px;color:#ffd166;font-size:28px;text-align:center}
.gen-section .sub{color:#9fd3ff;text-align:center;margin-bottom:18px}
.gen-tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:20px}
.gen-tabs button{padding:10px 16px;border:0;border-radius:10px;background:#24385f;color:white;cursor:pointer;font-size:14px}
.gen-tabs button.active{background:#00c2ff;color:#00111a;font-weight:bold}
.gen-tabs button:hover{background:#3d5a91}
.gen-tabs button.active:hover{background:#6ee7ff;color:#00111a}
.gen-panel{background:#0b1426;padding:20px;border-radius:14px;border:1px solid #2b3758;margin-bottom:15px}
.gen-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px;align-items:center}
.gen-row label{flex:0 0 110px;color:#9fd3ff;font-size:14px}
.gen-row input,.gen-row select{flex:1;min-width:140px;padding:10px;border-radius:8px;border:1px solid #2b3758;background:#05070d;color:#d7f7ff;font-size:15px}
.gen-row input:focus,.gen-row select:focus{outline:none;border-color:#00c2ff}
.gen-row .hint{flex:0 0 100%;color:#7a8aa8;font-size:12px;margin-left:110px;margin-top:-8px}
.gen-out{background:#05070d;border:2px solid #00c2ff;border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px}
.gen-out pre{margin:0;flex:1;background:transparent;padding:0;color:#6ee7ff;font-size:15px}
.quick{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.quick button{padding:8px 12px;border:0;border-radius:8px;background:#2b3758;color:white;cursor:pointer;font-size:13px}
.quick button:hover{background:#3d5a91}
.tip{background:#1f2a44;border-left:4px solid #ffd166;padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:13px;color:#ffe9a0}
</style>
</head>
<body>

<header>
<h1>⚔ Minecraft 神器库 ⚔</h1>
<p>1.21.11 指令收藏站 · 一键复制 · 内置生成器</p>
<input id="search" placeholder="搜索：药水 / 鞘翅 / 烟花 / 盔甲 / Boss...">
</header>

<!-- ====== 指令生成器 ====== -->
<section class="gen-section">
<h2>🛠️ 指令生成器</h2>
<p class="sub">不会写指令？选一下就行，自动给你生成</p>

<div class="gen-tabs" id="genTabs">
<button data-gen="tp" class="active">🚀 传送 /tp</button>
<button data-gen="summon">👹 召唤生物 /summon</button>
<button data-gen="give">🎁 给予物品 /give</button>
<button data-gen="effect">✨ 加效果 /effect</button>
<button data-gen="gamemode">🎮 游戏模式</button>
<button data-gen="time">🌙 时间/天气</button>
<button data-gen="kill">💀 清除 /kill</button>
<button data-gen="setblock">🧱 放方块</button>
</div>

<!-- 各生成器面板 -->
<div class="gen-panel" id="panel-tp">
<div class="tip">💡 把自己/玩家传送到某个地方。坐标用 ~ 表示"当前位置"，比如 ~ ~10 ~ 就是往上飞10格</div>
<div class="gen-row"><label>谁要传送</label>
<select id="tp_who">
<option value="@p">@p（最近的玩家=你自己）</option>
<option value="@s">@s（自己）</option>
<option value="@a">@a（所有玩家）</option>
<option value="@e">@e（所有实体）</option>
<option value="custom">输入玩家名字...</option>
</select></div>
<div class="gen-row" id="tp_who_name_row" style="display:none"><label>玩家名</label>
<input id="tp_who_name" placeholder="Steve"></div>

<div class="gen-row"><label>传送方式</label>
<select id="tp_mode">
<option value="coord">传送到坐标</option>
<option value="player">传送到某个玩家身边</option>
<option value="rel">在自己附近移动</option>
</select></div>

<div class="gen-row" id="tp_coord_row"><label>X Y Z</label>
<input id="tp_x" placeholder="X 例: 100" style="flex:1">
<input id="tp_y" placeholder="Y 例: 80" style="flex:1">
<input id="tp_z" placeholder="Z 例: -200" style="flex:1"></div>

<div class="gen-row" id="tp_player_row" style="display:none"><label>目标玩家</label>
<input id="tp_target" placeholder="例: Steve 或 @p"></div>

<div class="quick">
<button onclick="tpQuick('~ ~50 ~')">飞50格</button>
<button onclick="tpQuick('~ ~100 ~')">飞100格</button>
<button onclick="tpQuick('0 100 0')">到出生点上空</button>
<button onclick="tpQuick('~ 200 ~')">飞到Y=200</button>
<button onclick="tpQuick('~ ~ ~')">原地</button>
</div>
</div>

<div class="gen-panel" id="panel-give" style="display:none">

<div class="gen-panel" id="panel-effect" style="display:none">

<script>
const commands = [
{

let current = "全部";

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";
  commands.filter(x=>{
    return (current==="全部" || x.cat===current) &&
    (x.title.toLowerCase().includes(q) || x.cat.toLowerCase().includes(q) || x.code.toLowerCase().includes(q));
  }).forEach((x,i)=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <span class="tag">${x.cat}</span>
      <h2>${x.title}</h2>
      <pre id="code${i}">${x.code}</pre>
      <button class="copy" onclick="copyCode(${i})">📋 复制指令</button>
    `;
    list.appendChild(card);
  });
}

function filter(cat){
  current=cat;
  render();
}

function copyCode(i){
  navigator.clipboard.writeText(commands.filter(x=>{
    const q=document.getElementById("search").value.toLowerCase();
    return (current==="全部" || x.cat===current) &&
    (x.title.toLowerCase().includes(q) || x.cat.toLowerCase().includes(q) || x.code.toLowerCase().includes(q));
  })[i].code);
  alert("已复制！");
}

document.getElementById("search").addEventListener("input",render);
render();

/* ========================
   指令生成器逻辑
======================== */
const genTabs = document.querySelectorAll("#genTabs button");
const panels = {
  tp: document.getElementById("panel-tp"),
  summon: document.getElementById("panel-summon"),
  give: document.getElementById("panel-give"),
  effect: document.getElementById("panel-effect"),
  gamemode: document.getElementById("panel-gamemode"),
  time: document.getElementById("panel-time"),
  kill: document.getElementById("panel-kill"),
  setblock: document.getElementById("panel-setblock")
};
let currentGen = "tp";

genTabs.forEach(btn=>{
  btn.addEventListener("click",()=>{
    genTabs.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentGen = btn.dataset.gen;
    Object.keys(panels).forEach(k=>panels[k].style.display = (k===currentGen)?"block":"none");
    update();
  });
});

const $ = id=>document.getElementById(id);

/* TP */
function buildTP(){
  const who = $("tp_who").value;
  const whoFinal = who==="custom" ? ($("tp_who_name").value || "玩家名") : who;
  $("tp_who_name_row").style.display = who==="custom" ? "flex" : "none";

  const mode = $("tp_mode").value;
  $("tp_coord_row").style.display = (mode==="coord"||mode==="rel") ? "flex" : "none";
  $("tp_player_row").style.display = mode==="player" ? "flex" : "none";

  if(mode==="player"){
    const target = $("tp_target").value || "@p";
    return `/tp ${whoFinal} ${target}`;
  } else {
    const x = $("tp_x").value || "~";
    const y = $("tp_y").value || "~";
    const z = $("tp_z").value || "~";
    return `/tp ${whoFinal} ${x} ${y} ${z}`;
  }
}
function tpQuick(s){
  const parts = s.split(" ");
  $("tp_x").value = parts[0];
  $("tp_y").value = parts[1];
  $("tp_z").value = parts[2];
  $("tp_mode").value = "coord";
  update();
}

/* Summon */
function buildSummon(){
  const mob = $("sum_mob").value;
  const pos = $("sum_pos").value;
  $("sum_pos_custom").style.display = pos==="custom" ? "flex" : "none";

  let coord = "~ ~ ~";
  if(pos==="front") coord = "^ ^ ^5";
  else if(pos==="up") coord = "~ ~10 ~";
  else if(pos==="custom"){
    coord = `${$("sum_x").value||"~"} ${$("sum_y").value||"~"} ${$("sum_z").value||"~"}`;
  }

  const name = $("sum_name").value.trim();
  const fire = parseInt($("sum_fire").value);
  let nbt = [];
  if(name) nbt.push(`CustomName:'{"text":"${name}"}',CustomNameVisible:1b`);
  if(fire>0) nbt.push(`Fire:${fire}s`);
  const nbtStr = nbt.length ? ` {${nbt.join(",")}}` : "";

  const count = Math.max(1, parseInt($("sum_count").value)||1);
  const base = `/summon minecraft:${mob} ${coord}${nbtStr}`;
  if(count===1) return base;
  return Array(count).fill(base).join("\n");
}
function setSummon(mob){
  $("sum_mob").value = mob;
  update();
}

/* Give */
function buildGive(){
  const who = $("give_who").value;
  const whoFinal = who==="custom" ? ($("give_who_name").value || "玩家名") : who;
  $("give_who_name_row").style.display = who==="custom" ? "flex" : "none";

  const item = $("give_item").value;
  $("give_custom_row").style.display = item==="custom_item" ? "flex" : "none";
  const itemFinal = item==="custom_item" ? ($("give_custom").value || "minecraft:diamond") : `minecraft:${item}`;
  const count = Math.max(1, parseInt($("give_count").value)||1);
  return `/give ${whoFinal} ${itemFinal} ${count}`;
}

/* Effect */
function buildEffect(){
  const who = $("eff_who").value;
  const type = $("eff_type").value;
  if(type==="clear"){
    $("eff_dur_row").style.display="none";
    $("eff_lv_row").style.display="none";
    return `/effect clear ${who}`;
  }
  $("eff_dur_row").style.display="flex";
  $("eff_lv_row").style.display="flex";
  const dur = Math.max(1, parseInt($("eff_dur").value)||60);
  const lv = Math.max(1, parseInt($("eff_lv").value)||1);
  return `/effect give ${who} minecraft:${type} ${dur} ${lv-1} true`;
}
function effPreset(d,l){
  $("eff_dur").value = d;
  $("eff_lv").value = l;
  update();
}

/* Gamemode */
function buildGM(){
  return `/gamemode ${$("gm_mode").value} ${$("gm_who").value}`;
}

/* Time / Weather */
function buildTW(){
  const type = $("tw_type").value;
  $("tw_time_row").style.display = type.startsWith("time") ? "flex" : "none";
  $("tw_weather_row").style.display = type==="weather" ? "flex" : "none";
  if(type==="weather"){
    return `/weather ${$("tw_weather").value}`;
  }
  const cmd = type==="time_set" ? "set" : "add";
  return `/time ${cmd} ${$("tw_time").value}`;
}

/* Kill */
function buildKill(){
  let target = $("kill_what").value;
  const range = $("kill_range").value;
  if(range){
    if(target.includes("[")){
      target = target.replace("]", `,distance=..${range}]`);
    } else {
      target += `[distance=..${range}]`;
    }
  }
  return `/kill ${target}`;
}

/* Setblock */
function buildSetblock(){
  const x = $("sb_x").value || "~";
  const y = $("sb_y").value || "~";
  const z = $("sb_z").value || "~";
  return `/setblock ${x} ${y} ${z} minecraft:${$("sb_block").value} ${$("sb_mode").value}`;
}
function sbQuick(x,y,z){
  $("sb_x").value=x;
  $("sb_y").value=y;
  $("sb_z").value=z;
  update();
}

function update(){
  let out = "";
  switch(currentGen){
    case "tp": out = buildTP(); break;
    case "summon": out = buildSummon(); break;
    case "give": out = buildGive(); break;
    case "effect": out = buildEffect(); break;
    case "gamemode": out = buildGM(); break;
    case "time": out = buildTW(); break;
    case "kill": out = buildKill(); break;
    case "setblock": out = buildSetblock(); break;
  }
  $("gen_result").textContent = out;
}

function copyGen(){
  navigator.clipboard.writeText($("gen_result").textContent);
  const btn = event.target;
  const old = btn.textContent;
  btn.textContent = "✅ 已复制";
  setTimeout(()=>btn.textContent=old, 1200);
}

/* 监听所有生成器输入 */
document.querySelector(".gen-section").addEventListener("input", update);
document.querySelector(".gen-section").addEventListener("change", update);
update();
</script>
